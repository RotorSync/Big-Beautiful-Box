compresscmd /usr/bin/zstd
uncompresscmd /usr/bin/unzstd
compressext .zst
compressoptions -q -3

/home/pi/iol_dashboard.log {
    size 20M
    rotate 8
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/flow_control.log {
    size 10M
    rotate 6
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/serial_debug.log {
    size 5M
    rotate 8
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/button_debug.log /home/pi/menu_debug.log /home/pi/reset_debug.log /home/pi/relay_test.log /home/pi/rotorsync_watchdog.log /home/pi/dashboard_tick_errors.log {
    size 2M
    rotate 6
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/mopeka_history.csv {
    size 5M
    rotate 6
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/bug_reports/*.txt {
    monthly
    rotate 24
    missingok
    notifempty
    compress
    delaycompress
}
