/home/pi/iol_dashboard.log {
    size 20M
    rotate 8
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/serial_debug.log {
    size 5M
    rotate 8
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/button_debug.log /home/pi/menu_debug.log /home/pi/reset_debug.log /home/pi/relay_test.log /home/pi/rotorsync_watchdog.log {
    size 2M
    rotate 6
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}

/home/pi/bug_reports/*.txt {
    monthly
    rotate 24
    missingok
    notifempty
    compress
    delaycompress
}
